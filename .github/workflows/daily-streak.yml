name: Daily Streak Commit to TIL

on:
  schedule:
    - cron: '30 23 * * *'  # Daily 23:30 UTC (06:30 WIB next day)
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TIL repo
        uses: actions/checkout@v4
        with:
          repository: ngampus/til
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Generate daily TIL entry
        run: |
          DATE=$(date +%F)
          WEEK=$(date +%V)
          MONTH=$(date +%B\ %Y)
          DAY_NUM=$(( ($(date -d "$DATE" +%s) - $(date -d "2026-07-13" +%s)) / 86400 + 1 ))
          
          # Create month header if not exists
          if ! grep -q "## $MONTH" README.md 2>/dev/null; then
            echo -e "\n## $MONTH\n" >> README.md
          fi
          
          # Create week header if not exists
          if ! grep -q "### Week $WEEK" README.md 2>/dev/null; then
            echo -e "### Week $WEEK\n" >> README.md
          fi
          
          # Focus based on day of week
          DOW=$(date +%u)
          case $DOW in
            1) FOCUS="CI/CD" ;;
            2) FOCUS="IaC" ;;
            3) FOCUS="K8s" ;;
            4) FOCUS="Observability" ;;
            5) FOCUS="GitOps" ;;
            6) FOCUS="Security" ;;
            7) FOCUS="Review" ;;
          esac
          
          # Add daily entry
          cat >> README.md <<HEREEOF
#### $DATE (Day $DAY_NUM)

- **TIL**: Daily DevOps learning entry
- **Progress**: Day $DAY_NUM/90
- **Focus**: $FOCUS

HEREEOF

      - name: Commit and push
        run: |
          git config user.name "ngampus-bot"
          git config user.email "bot@ngampus.dev"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily TIL $(date +%F)"
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
